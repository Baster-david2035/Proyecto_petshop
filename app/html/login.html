<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PetShop - Iniciar Sesión</title>
    <link rel="stylesheet" href="css/login.css">
</head>
<body class="login-split-body">

    <div class="login-split-container">
        
        <div class="login-brand-side">
            <div class="brand-overlay"></div>
            <div class="brand-welcome-content">
                <span class="brand-emoji">🐾</span>
                <h1>PetShop</h1>
                <p>Encuentra a tu compañero ideal y gestiona todos sus cuidados en un solo lugar.</p>
            </div>
        </div>

        <div class="login-form-side">
            <div class="login-box-clean">
                <h2>¡Hola de nuevo!</h2>
                <p class="login-subtitle">Ingresa tus credenciales para acceder a la plataforma.</p>

                <div id="login-error-message" class="login-toast-error">
                    ⚠️ Correo o contraseña incorrectos. Inténtalo de nuevo.
                </div>

                <form id="mainLoginForm">
                    <div class="input-group-modern">
                        <label for="email">Correo Electrónico</label>
                        <input type="email" id="email" placeholder="ejemplo@correo.com" required autocomplete="username">
                    </div>

                    <div class="input-group-modern password-wrapper">
                        <label for="password">Contraseña</label>
                        <div class="password-relative-container">
                            <input type="password" id="password" placeholder="••••••••" required autocomplete="current-password">
                            <button type="button" id="togglePassword" class="toggle-password-btn">👁</button>
                        </div>
                    </div>

                    <div class="login-options-row">
                        <label class="remember-me">
                            <input type="checkbox"> Recordarme
                        </label>
                        <a href="recuperacion.html" class="forgot-pass-link">¿Olvidaste tu contraseña?</a>
                    </div>

                    <button type="submit" id="btnLoginSubmit" class="btn-login-modern">
                        <span id="btn-text">Iniciar Sesión</span>
                        <div id="btn-spinner" class="btn-spinner-loader"></div>
                    </button>
                </form>

                <p class="register-prompt">¿No tienes una cuenta? <a href="registro.html">Regístrate aquí</a></p>
            </div>
        </div>
    </div>

    <script src="js/session.js"></script>
    <script src="js/login.js"></script>
</body>
</html>
