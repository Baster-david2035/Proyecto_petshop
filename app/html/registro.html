<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PetShop - Crear Cuenta</title>
    <link rel="stylesheet" href="css/registro.css">
</head>
<body class="login-split-body">

    <div class="login-split-container">
        
        <div class="login-brand-side">
            <div class="brand-overlay"></div>
            <div class="brand-welcome-content">
                <span class="brand-emoji">🐾</span>
                <h1>Únete a la familia</h1>
                <p>Crea tu cuenta para comenzar a transformar la vida de tu próximo mejor amigo.</p>
            </div>
        </div>

        <div class="login-form-side">
            <div class="login-box-clean">
                <h2>Crear Cuenta</h2>
                <p class="login-subtitle">Completa tus datos personales para formar parte de nuestra comunidad.</p>

                <div id="register-success-message" class="login-toast-success">
                    🎉 ¡Cuenta creada con éxito! Redirigiendo a tu inicio...
                </div>

                <form id="registerForm">
                    <div class="input-group-modern">
                        <label for="name">Nombre Completo</label>
                        <input type="text" id="name" placeholder="Tu nombre y apellido" required autocomplete="name">
                    </div>

                    <div class="input-group-modern">
                        <label for="phone">Teléfono</label>
                        <input type="tel" id="phone" placeholder="Ej. +506 8888-8888" required autocomplete="tel">
                    </div>

                    <div class="input-group-modern">
                        <label for="email">Correo Electrónico</label>
                        <input type="email" id="email" placeholder="ejemplo@correo.com" required autocomplete="email">
                    </div>

                    <div class="input-group-modern password-wrapper">
                        <label for="password">Contraseña</label>
                        <div class="password-relative-container">
                            <input type="password" id="password" placeholder="Mínimo 8 caracteres" required autocomplete="new-password">
                            <button type="button" id="toggleRegisterPassword" class="toggle-password-btn">👁</button>
                        </div>
                    </div>

                    <button type="submit" id="btnRegisterSubmit" class="btn-login-modern">
                        <span id="btn-register-text">Registrarme</span>
                        <div id="btn-register-spinner" class="btn-spinner-loader"></div>
                    </button>
                </form>

                <div class="register-prompt">
                    ¿Ya tienes cuenta? <a href="login.html">Inicia sesión</a>
                </div>
            </div>
        </div>
    </div>

    <script src="js/session.js"></script>
    <script src="js/registro.js"></script>
</body>
</html>
